# DHL GenAI Gateway — Production Model Registry
# Source: https://dpdhl.sharepoint.com/sites/genAIgateway/SitePages/Supported-Models.aspx
#
# Loaded when APIGEE_ENVIRONMENT=production
#
# Fields:
#   deployment_id     : exact ID used in the Apigee proxy path
#   provider          : vertex_ai | azure_openai
#   model_type        : chat | embedding
#   supports_streaming: (optional, default: true) whether SSE streaming is supported
#   supports_tools    : (optional, default: false) whether function/tool calling is supported
#   supports_vision   : (optional, default: false) whether image/vision input is supported
#   context_window    : (optional) maximum context window in tokens

